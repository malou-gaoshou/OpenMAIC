services:
  openmaic:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      # Mount server-providers.yml for team-shared provider config
      - ./server-providers.yml:/app/server-providers.yml:ro
      - openmaic-data:/app/data
    restart: unless-stopped

volumes:
  openmaic-data:
